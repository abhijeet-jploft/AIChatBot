<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat widget</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var q = new URLSearchParams(window.location.search);
      var companyId = q.get('companyId') || q.get('company_id') || '_JP_Loft';
      var apiKey = q.get('apiKey') || q.get('api_key') || '';
      var companyName = q.get('companyName') || q.get('company_name') || 'JP Loft';
      var apiUrl = q.get('apiUrl') || q.get('api_url') || (window.location.origin + '/api');

      window.JPLoftChatConfig = {
        apiUrl: apiUrl,
        companyId: companyId,
        companyName: companyName,
        apiKey: apiKey
      };
    })();
  </script>
  <script src="/chat-widget.js"></script>
</body>
</html>
