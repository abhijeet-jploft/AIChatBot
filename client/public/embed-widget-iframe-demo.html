<!DOCTYPE html>

<head>

    #help code {
      font-size: 0.8rem;
      background: #1e293b;
      padding: 0.15rem 0.35rem;
      border-radius: 4px;

      word-break: break-all;
    }
    #help .box {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
    }
  </style>
</head>

  <div id="help"></div>
